<section class="newsletter-section">
    <div class="newsletter-marquee" aria-hidden="true">
        <div class="newsletter-marquee__track">
            <span>Join Our Newsletter</span>
            <span>Join Our Newsletter</span>

        </div>
    </div>

    <div class="newsletter-card">
        <h2 class="newsletter-card__title">
            Join Our Newsletter
        </h2>

        <form class="newsletter-form" data-newsletter-form>
            <div class="newsletter-form__row">
                <label class="newsletter-form__field">
                    <input class="newsletter-form__input" type="text" name="name" placeholder="Your Name"
                        autocomplete="name" required>
                </label>

                <label class="newsletter-form__field">
                    <input class="newsletter-form__input" type="email" name="email" placeholder="Your Email"
                        autocomplete="email" required>
                </label>
            </div>

            <button class="newsletter-form__button" type="submit">
                Subscribe
            </button>

            <p class="newsletter-form__message" data-newsletter-message aria-live="polite"></p>
        </form>
    </div>
</section>
