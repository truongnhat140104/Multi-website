<section class="shuttle-timetable" id="shuttle-timetable">
    <div class="shuttle-timetable__container container">
        <header class="shuttle-timetable__header">
            <h2 class="shuttle-timetable__title">
                Free Shuttle Bus Timetable
            </h2>

            <p class="shuttle-timetable__subtitle">
                Times shown are estimated departure times.
            </p>
        </header>

        <div class="shuttle-tabs" role="tablist" aria-label="Shuttle timetable days">
            <button class="shuttle-tab shuttle-tab--active" type="button" role="tab" aria-selected="true"
                aria-controls="shuttle-panel" id="shuttle-tab-friday" data-day="friday">
                Friday
            </button>

            <button class="shuttle-tab" type="button" role="tab" aria-selected="false" aria-controls="shuttle-panel"
                id="shuttle-tab-saturday" data-day="saturday">
                Saturday
            </button>

            <button class="shuttle-tab" type="button" role="tab" aria-selected="false" aria-controls="shuttle-panel"
                id="shuttle-tab-sunday" data-day="sunday">
                Sunday
            </button>
        </div>

        <div class="shuttle-panel" id="shuttle-panel" role="tabpanel" aria-labelledby="shuttle-tab-friday">
            <h3 class="shuttle-panel__title" data-shuttle-date>
                Friday 15th May 2026
            </h3>

            <div class="shuttle-grid" id="shuttle-routes-container">
                <!-- JavaScript render route cards here -->
            </div>
        </div>
    </div>
</section>
