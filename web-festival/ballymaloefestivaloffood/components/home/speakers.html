<section class="speakers-section">
    <div class="speakers-section__container">
        <h2 class="speakers-section__title">
            2026 Speakers
        </h2>

        <div class="speakers-slider" data-speakers-slider>
            <button class="speakers-slider__arrow speakers-slider__arrow--prev" type="button"
                aria-label="Previous speakers" data-speakers-prev>
                <span aria-hidden="true">‹</span>
            </button>

            <div class="speakers-slider__viewport">
                <div class="speakers-slider__track" data-speakers-track>
                    <article class="speaker-card">
                        <a class="speaker-card__link" href="#">
                            <img class="speaker-card__image" src="./assets/images/home/speakers/bosco.jpg" alt="Bosco">

                            <h3 class="speaker-card__name">
                                Bosco
                            </h3>
                        </a>
                    </article>

                    <article class="speaker-card">
                        <a class="speaker-card__link" href="#">
                            <img class="speaker-card__image" src="./assets/images/home/speakers/cherie-denham.avif"
                                alt="Cherie Denham">

                            <h3 class="speaker-card__name">
                                Cherie Denham
                            </h3>
                        </a>
                    </article>

                    <article class="speaker-card">
                        <a class="speaker-card__link" href="#">
                            <img class="speaker-card__image" src="./assets/images/home/speakers/darina-allen.avif"
                                alt="Darina Allen">

                            <h3 class="speaker-card__name">
                                Darina Allen
                            </h3>
                        </a>
                    </article>

                    <article class="speaker-card">
                        <a class="speaker-card__link" href="#">
                            <img class="speaker-card__image" src="./assets/images/home/speakers/graham-herterich.jpg"
                                alt="Graham Herterich">

                            <h3 class="speaker-card__name">
                                Graham Herterich
                            </h3>
                        </a>
                    </article>

                    <article class="speaker-card">
                        <a class="speaker-card__link" href="#">
                            <img class="speaker-card__image" src="./assets/images/home/speakers/helen-goh.avif"
                                alt="Helen Goh">

                            <h3 class="speaker-card__name">
                                Helen Goh
                            </h3>
                        </a>
                    </article>

                    <article class="speaker-card">
                        <a class="speaker-card__link" href="#">
                            <img class="speaker-card__image" src="./assets/images/home/speakers/jancis-robinson.avif"
                                alt="Jancis Robinson MW">

                            <h3 class="speaker-card__name">
                                Jancis Robinson MW
                            </h3>
                        </a>
                    </article>

                    <article class="speaker-card">
                        <a class="speaker-card__link" href="#">
                            <img class="speaker-card__image" src="./assets/images/home/speakers/jimmy-doherty.avif"
                                alt="Jimmy Doherty">

                            <h3 class="speaker-card__name">
                                Jimmy Doherty
                            </h3>
                        </a>
                    </article>

                    <article class="speaker-card">
                        <a class="speaker-card__link" href="#">
                            <img class="speaker-card__image" src="./assets/images/home/speakers/kevin-dundon.avif"
                                alt="Kevin Dundon">

                            <h3 class="speaker-card__name">
                                Kevin Dundon
                            </h3>
                        </a>
                    </article>
                </div>
            </div>

            <button class="speakers-slider__arrow speakers-slider__arrow--next" type="button" aria-label="Next speakers"
                data-speakers-next>
                <span aria-hidden="true">›</span>
            </button>
        </div>

        <div class="speakers-slider__dots" data-speakers-dots>
            <button class="speakers-slider__dot is-active" type="button" aria-label="Show speakers page 1"
                data-speakers-page="0"></button>

            <button class="speakers-slider__dot" type="button" aria-label="Show speakers page 2"
                data-speakers-page="1"></button>
        </div>

        <a class="speakers-section__all" href="#">
            See all speakers
            <span aria-hidden="true">→</span>
        </a>
    </div>
</section>
