<section class="contact-intro" aria-labelledby="contact-intro-title">
    <div class="contact-intro__container">
        <h2 class="contact-intro__title" id="contact-intro-title">Be a Part of BFF 2026</h2>
        <p class="contact-intro__subtitle">
            Volunteers, exhibitors, food trucks and sponsors - we'd love to hear from you!
        </p>
    </div>
</section>

<section class="contact-main" id="contact-form" aria-labelledby="contact-form-title">
    <div class="contact-main__grid">
        
        <!-- Left Box: White background Form -->
        <div class="contact-main__form-box">
            <div class="contact-form-container">
                <h2 class="contact-main__title" id="contact-form-title">Get in Touch</h2>

                <form class="contact-form" novalidate>
                    <div class="contact-form__grid">
                        
                        <div class="contact-form__field">
                            <label for="contact-name">Your Name</label>
                            <input id="contact-name" name="name" type="text" autocomplete="name" placeholder="Your name">
                            <span class="contact-form__error" id="contact-name-error" role="alert"></span>
                        </div>

                        <div class="contact-form__field">
                            <label for="contact-email">Email</label>
                            <input id="contact-email" name="email" type="email" autocomplete="email" placeholder="you@example.com">
                            <span class="contact-form__error" id="contact-email-error" role="alert"></span>
                        </div>

                        <div class="contact-form__field">
                            <label for="contact-phone">Phone</label>
                            <input id="contact-phone" name="phone" type="tel" autocomplete="tel" placeholder="Your phone number">
                            <span class="contact-form__error" id="contact-phone-error" role="alert"></span>
                        </div>

                        <div class="contact-form__field">
                            <label for="contact-subject">Subject</label>
                            <input id="contact-subject" name="subject" type="text" placeholder="How can we help?">
                            <span class="contact-form__error" id="contact-subject-error" role="alert"></span>
                        </div>

                        <div class="contact-form__field contact-form__group--full">
                            <label for="contact-message">Message</label>
                            <textarea id="contact-message" name="message" rows="5" placeholder="Tell us a little more"></textarea>
                            <span class="contact-form__error" id="contact-message-error" role="alert"></span>
                        </div>

                        <div class="contact-form__field contact-form__group--full">
                            <button class="contact-form__submit" type="submit">Submit</button>
                        </div>
                        
                    </div>
                    <p class="contact-form__status" role="status" aria-live="polite"></p>
                </form>
            </div>
        </div>

        <!-- Right Box: Cover Image -->
        <div class="contact-main__image-box">
            <img class="contact-main__image" src="assets/images/contact/contact-form.jpeg" alt="Ballymaloe Festival contact team">
        </div>
        
    </div>
</section>
