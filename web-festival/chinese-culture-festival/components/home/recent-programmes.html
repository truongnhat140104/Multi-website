<section class="recent-programmes" id="recent-programmes">
    <div class="recent-programmes__decor" aria-hidden="true"></div>

    <div class="recent-programmes__container">

        <div class="recent-programmes__header">

            <div class="recent-programmes__heading-group">
                <span class="recent-programmes__eyebrow">
                    Discover what’s happening
                </span>

                <h2 class="recent-programmes__title">
                    Recent programme
                </h2>
            </div>

            <a class="recent-programmes__explore" href="./pages/programmes.html">
                Explore More

                <span aria-hidden="true">
                    →
                </span>
            </a>

        </div>

        <div class="recent-programmes__toolbar">

            <label class="recent-programmes__month-label" for="recent-programmes-month">
                Month
            </label>

            <div class="recent-programmes__month-select-wrap">
                <select class="recent-programmes__month-select" id="recent-programmes-month" data-programme-month>
                    <option value="07" selected>
                        July
                    </option>

                    <option value="08">
                        August
                    </option>

                    <option value="09">
                        September
                    </option>
                </select>

                <span class="recent-programmes__month-icon" aria-hidden="true">
                    <i class="fa fa-angle-down"></i>
                </span>
            </div>

        </div>

        <div class="programme-calendar">

            <button class="programme-calendar__arrow programme-calendar__arrow--prev" type="button"
                aria-label="Previous dates" data-calendar-prev>
                <i class="fa fa-angle-left" aria-hidden="true"></i>
            </button>

            <div class="programme-calendar__viewport" data-calendar-viewport>
                <div class="programme-calendar__track" data-calendar-track>
                    <!-- Dates rendered by JavaScript -->
                </div>
            </div>

            <button class="programme-calendar__arrow programme-calendar__arrow--next" type="button"
                aria-label="Next dates" data-calendar-next>
                <i class="fa fa-angle-right" aria-hidden="true"></i>
            </button>

        </div>

        <div class="recent-programmes__slider">

            <button class="recent-programmes__slider-arrow recent-programmes__slider-arrow--prev" type="button"
                aria-label="Previous programmes" data-programme-prev>
                <i class="fa fa-angle-left" aria-hidden="true"></i>
            </button>

            <div class="recent-programmes__viewport" data-programme-viewport>
                <div class="recent-programmes__track" data-programme-track>
                    <!-- Programme cards rendered by JavaScript -->
                </div>
            </div>

            <button class="recent-programmes__slider-arrow recent-programmes__slider-arrow--next" type="button"
                aria-label="Next programmes" data-programme-next>
                <i class="fa fa-angle-right" aria-hidden="true"></i>
            </button>

        </div>

        <p class="recent-programmes__empty" data-programme-empty hidden>
            No programmes are available for this date.
        </p>

    </div>
</section>
