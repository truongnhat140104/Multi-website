<section class="lantern-hero" id="lantern-hero">
  <div class="lantern-slider" data-lantern-slider>

    <!-- Slide 1 -->
    <article class="lantern-slide is-active" aria-hidden="false">
      <img class="lantern-slide__image" src="./assets/images/home/hero-1.jpeg" alt="Lễ hội đèn trời Chiang Mai">
      <div class="lantern-slide__overlay"></div>
    </article>

    <!-- Slide 2 -->
    <article class="lantern-slide" aria-hidden="true">
      <img class="lantern-slide__image" src="./assets/images/home/hero-2.jpg" alt="Đám đông tham dự lễ hội đèn trời">
      <div class="lantern-slide__overlay"></div>
    </article>

    <!-- Slide 3 -->
    <article class="lantern-slide" aria-hidden="true">
      <img class="lantern-slide__image" src="./assets/images/home/hero-3.jpg" alt="Nghi lễ tôn giáo tại lễ hội đèn trời">
      <div class="lantern-slide__overlay"></div>
    </article>

  </div>

  <!-- Hero Content -->
  <div class="lantern-hero__content">
    <p class="lantern-hero__eyebrow">
      ✦ Chiang Mai, Thái Lan ✦

    <h1 class="lantern-hero__title">
      Lễ hội Đèn trời

      Khomloy
      <br>

    <p class="lantern-hero__description">
      Trải nghiệm lễ hội đèn trời ngoạn mục nhất hành tinh
    </p>

    <div class="lantern-hero__actions">
      <a class="lantern-button lantern-button--primary" href="#packages">
        Xem Hạng Vé
      </a>

      <a class="lantern-button lantern-button--outline" href="#about-event">
        Về Sự Kiện
      </a>
    </div>
  </div>

  <!-- Pagination Dots -->
  <div class="lantern-slider__pagination" data-slider-pagination></div>

  <!-- Scroll Down Button -->
  <button class="lantern-hero__scroll-btn" id="js-hero-scroll-btn" aria-label="Cuộn xuống phần tiếp theo">
    <span class="mouse-icon">
      <span class="wheel"></span>
    </span>
  </button>
