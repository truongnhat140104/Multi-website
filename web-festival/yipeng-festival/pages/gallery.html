<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thư viện ảnh - Chiang Mai CAD Khomloy Sky Lantern Festival 2026</title>
    <meta name="description" content="Thư viện hình ảnh chính thức về lễ hội thả đèn trời Yi Peng qua các năm tại Chiang Mai, Thái Lan.">

    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">

    <!-- CSS Stylesheets -->
    <link rel="stylesheet" href="../assets/css/base.css">
    <link rel="stylesheet" href="../assets/css/header.css">
    <link rel="stylesheet" href="../assets/css/home.css">
    <link rel="stylesheet" href="../assets/css/components/page-hero.css">
    <link rel="stylesheet" href="../assets/css/gallery.css">
    <link rel="stylesheet" href="../assets/css/responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>

<body class="home-page" id="top">
    <!-- Top Bar Component -->
    <div data-component="../components/common/topbar.html"></div>

    <!-- Header Component -->
    <div data-component="../components/common/header.html"></div>

    <main class="gallery-page">
        <!-- Hero Banner Component -->
        <section
          class="page-hero"
          data-page-hero
          data-title="Khoảnh khắc lễ hội"
          data-subtitle="Khám phá những khoảnh khắc đáng nhớ tại Yi Peng Chiang Mai."
          data-background="../assets/images/home/package-02.jpg"
          data-active-menu="gallery"
          data-breadcrumb="Thư viện ảnh"
        ></section>

        <!-- Festival Gallery Section -->
        <section class="festival-gallery" id="festival-gallery">
          <div class="festival-gallery__container">
            
            <!-- Filters list tabs -->
            <div class="gallery-filter" role="tablist" aria-label="Lọc ảnh theo năm">
              <button
                class="gallery-filter__button is-active"
                type="button"
                role="tab"
                aria-selected="true"
                data-gallery-filter="all"
              >
                Tất cả các năm
              </button>

              <button
                class="gallery-filter__button"
                type="button"
                role="tab"
                aria-selected="false"
                data-gallery-filter="2026"
              >
                2026
              </button>

              <button
                class="gallery-filter__button"
                type="button"
                role="tab"
                aria-selected="false"
                data-gallery-filter="2025"
              >
                2025
              </button>

              <button
                class="gallery-filter__button"
                type="button"
                role="tab"
                aria-selected="false"
                data-gallery-filter="2023"
              >
                2023
              </button>
            </div>

            <!-- Masonry Grid list -->
            <div class="festival-gallery__grid" data-gallery-grid>
              
              <!-- Image 1 - 2026 -->
              <figure class="gallery-item gallery-item--large" data-gallery-item data-year="2026">
                <button class="gallery-item__button" type="button" aria-label="Xem ảnh lớn">
                  <img
                    class="gallery-item__image"
                    src="../assets/images/gallery/memory-01.jpg"
                    alt="Thả hàng ngàn chiếc đèn trời Khomloy rực sáng đêm hội 2026"
                    loading="lazy"
                  >
                  <span class="gallery-item__overlay">
                    <i class="fa fa-expand" aria-hidden="true"></i>
                  </span>
                </button>
              </figure>

              <!-- Image 2 - 2026 -->
              <figure class="gallery-item gallery-item--medium" data-gallery-item data-year="2026">
                <button class="gallery-item__button" type="button" aria-label="Xem ảnh lớn">
                  <img
                    class="gallery-item__image"
                    src="../assets/images/gallery/memory-02.jpg"
                    alt="Màn biểu diễn múa nghệ thuật Lanna lung linh dưới ánh nến 2026"
                    loading="lazy"
                  >
                  <span class="gallery-item__overlay">
                    <i class="fa fa-expand" aria-hidden="true"></i>
                  </span>
                </button>
              </figure>

              <!-- Image 3 - 2025 -->
              <figure class="gallery-item gallery-item--small" data-gallery-item data-year="2025">
                <button class="gallery-item__button" type="button" aria-label="Xem ảnh lớn">
                  <img
                    class="gallery-item__image"
                    src="../assets/images/gallery/memory-03.jpg"
                    alt="Không gian trang nghiêm của nghi lễ tụng kinh cầu bình an 2025"
                    loading="lazy"
                  >
                  <span class="gallery-item__overlay">
                    <i class="fa fa-expand" aria-hidden="true"></i>
                  </span>
                </button>
              </figure>

              <!-- Image 4 - 2025 -->
              <figure class="gallery-item gallery-item--wide" data-gallery-item data-year="2025">
                <button class="gallery-item__button" type="button" aria-label="Xem ảnh lớn">
                  <img
                    class="gallery-item__image"
                    src="../assets/images/gallery/memory-04.jpg"
                    alt="Màn trình diễn pháo hoa rực rỡ chào đón lễ hội 2025"
                    loading="lazy"
                  >
                  <span class="gallery-item__overlay">
                    <i class="fa fa-expand" aria-hidden="true"></i>
                  </span>
                </button>
              </figure>

              <!-- Image 5 - 2025 -->
              <figure class="gallery-item gallery-item--large" data-gallery-item data-year="2025">
                <button class="gallery-item__button" type="button" aria-label="Xem ảnh lớn">
                  <img
                    class="gallery-item__image"
                    src="../assets/images/gallery/memory-05.jpg"
                    alt="Khách du lịch quốc tế thả đèn hoa đăng Krathong truyền thống 2025"
                    loading="lazy"
                  >
                  <span class="gallery-item__overlay">
                    <i class="fa fa-expand" aria-hidden="true"></i>
                  </span>
                </button>
              </figure>

              <!-- Image 6 - 2023 -->
              <figure class="gallery-item gallery-item--medium" data-gallery-item data-year="2023">
                <button class="gallery-item__button" type="button" aria-label="Xem ảnh lớn">
                  <img
                    class="gallery-item__image"
                    src="../assets/images/gallery/memory-06.jpg"
                    alt="Đèn Khomloy bay thành dải lấp lánh như dải ngân hà 2023"
                    loading="lazy"
                  >
                  <span class="gallery-item__overlay">
                    <i class="fa fa-expand" aria-hidden="true"></i>
                  </span>
                </button>
              </figure>

              <!-- Image 7 - 2023 -->
              <figure class="gallery-item gallery-item--small" data-gallery-item data-year="2023">
                <button class="gallery-item__button" type="button" aria-label="Xem ảnh lớn">
                  <img
                    class="gallery-item__image"
                    src="../assets/images/gallery/memory-07.jpg"
                    alt="Du khách rạng rỡ lưu giữ khoảnh khắc thả đèn trời 2023"
                    loading="lazy"
                  >
                  <span class="gallery-item__overlay">
                    <i class="fa fa-expand" aria-hidden="true"></i>
                  </span>
                </button>
              </figure>

            </div>

          </div>
        </section>
    </main>

    <!-- Lightbox Zoom Modal Component -->
    <div
      class="gallery-lightbox"
      data-gallery-lightbox
      role="dialog"
      aria-modal="true"
      aria-label="Xem ảnh"
      hidden
    >
      <div class="gallery-lightbox__backdrop" data-lightbox-close></div>

      <div class="gallery-lightbox__content">
        <button
          class="gallery-lightbox__close"
          type="button"
          aria-label="Đóng ảnh"
          data-lightbox-close
        >
          <i class="fa fa-times" aria-hidden="true"></i>
        </button>

        <button
          class="gallery-lightbox__navigation gallery-lightbox__navigation--previous"
          type="button"
          aria-label="Ảnh trước"
          data-lightbox-previous
        >
          <i class="fa fa-chevron-left" aria-hidden="true"></i>
        </button>

        <figure class="gallery-lightbox__figure">
          <img
            class="gallery-lightbox__image"
            src=""
            alt=""
          >
          <figcaption class="gallery-lightbox__caption"></figcaption>
        </figure>

        <button
          class="gallery-lightbox__navigation gallery-lightbox__navigation--next"
          type="button"
          aria-label="Ảnh tiếp theo"
          data-lightbox-next
        >
          <i class="fa fa-chevron-right" aria-hidden="true"></i>
        </button>

        <div class="gallery-lightbox__counter">
          <span data-lightbox-current>1</span>
          <span>/</span>
          <span data-lightbox-total>1</span>
        </div>
      </div>
    </div>

    <!-- Footer Component -->
    <div data-component="../components/common/footer.html"></div>

    <!-- JavaScript Files -->
    <script src="../assets/js/component-loader.js"></script>
    <script src="../assets/js/header.js"></script>
    <script src="../assets/js/page-hero.js"></script>
    <script src="../assets/js/gallery.js"></script>
</body>

</html>
