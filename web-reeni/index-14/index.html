<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Reeni is a modern personal portfolio template for designers, developers, content writer, cleaner, programmer, fashion designer, model, Influencer and freelancers. Fully responsive, SEO-friendly, Bootstrap and easy to customize.">
    <link rel="shortcut icon" type="image/x-icon" href="../assets/images/favicon.svg">
    <title>Home 12 Reeni - Personal Portfolio HTML Template | Freelancer & Developer Portfolio</title>
    <!-- Bootstrap min css -->
    <link rel="stylesheet" href="../assets/css/vendor/fontawesome.css">
    <link rel="stylesheet" href="../assets/css/plugins/swiper.css">
    <link rel="stylesheet" href="../assets/css/plugins/odometer.css">
    <link rel="stylesheet" href="../assets/css/vendor/animate.min.css">
    <link rel="stylesheet" href="../assets/css/vendor/bootstrap.min.css">
    <!-- custom css -->
    <link rel="stylesheet" href="../assets/css/style.css">
</head>

<body>

    <!-- Header desktop (sidebar trái), header mobile bar, và menu popup mobile -->
    <div data-component="partials/header-desktop.html"></div>
    <div data-component="partials/header-mobile-bar.html"></div>
    <div data-component="partials/mobile-menu.html"></div>

    <!-- Khung sườn bọc toàn bộ nội dung chính -->
    <div class="page-with-left-header">

        <div data-component="partials/hero.html"></div>
        <div data-component="partials/features.html"></div>
        <div data-component="partials/portfolio.html"></div>
        <div data-component="partials/resume.html"></div>
        <div data-component="partials/clients.html"></div>
        <div data-component="partials/pricing.html"></div>
        <div data-component="partials/blog.html"></div>
        <div data-component="partials/contact.html"></div>
        <div data-component="partials/footer.html"></div>

    </div>

    <div data-component="partials/chat-widget.html"></div>
    <div data-component="partials/scroll-progress.html"></div>

    <!-- Loader: nạp component rồi mới nạp vendor/plugin scripts theo đúng thứ tự -->
    <script src="assets/include.js"></script>

    <script>
        // Chờ toàn bộ component + script vendor nạp xong rồi mới khởi tạo particlesJS
        document.addEventListener('components:ready', function () {
            if (typeof particlesJS === 'function') {
                particlesJS('particles-js', {
                    "particles": {
                        "number": {
                            "value": 7,
                            "density": {
                                "enable": true,
                                "value_area": 1200
                            }
                        },
                        "color": {
                            "value": ["#ffffff"]
                        },
                        "shape": {
                            "type": "star",
                            "stroke": {
                                "width": 0,
                                "color": "#000000"
                            },
                            "polygon": {
                                "nb_sides": 5
                            },
                            "image": {
                                "src": "img/github.svg",
                                "width": 100,
                                "height": 100
                            }
                        },
                        "opacity": {
                            "value": 0.8,
                            "random": true,
                            "anim": {
                                "enable": false,
                                "speed": 1,
                                "opacity_min": 0.1,
                                "sync": false
                            }
                        },
                        "size": {
                            "value": 4,
                            "random": true,
                            "anim": {
                                "enable": false,
                                "speed": 40,
                                "size_min": 0.1,
                                "sync": false
                            }
                        },
                        "line_linked": {
                            "enable": false,
                            "distance": 150,
                            "color": "#ffffff",
                            "opacity": 0.4,
                            "width": 1
                        },
                        "move": {
                            "enable": true,
                            "speed": 6,
                            "direction": "none",
                            "random": false,
                            "straight": false,
                            "out_mode": "out",
                            "attract": {
                                "enable": false,
                                "rotateX": 600,
                                "rotateY": 1200
                            }
                        }
                    },
                    "interactivity": {
                        "detect_on": "canvas",
                        "events": {
                            "onhover": {
                                "enable": true,
                                "mode": "repulse"
                            },
                            "onclick": {
                                "enable": true,
                                "mode": "push"
                            },
                            "resize": true
                        },
                        "modes": {
                            "grab": {
                                "distance": 400,
                                "line_linked": {
                                    "opacity": 1
                                }
                            },
                            "bubble": {
                                "distance": 800,
                                "size": 40,
                                "duration": 2,
                                "opacity": 8,
                                "speed": 3
                            },
                            "repulse": {
                                "distance": 200
                            },
                            "push": {
                                "particles_nb": 4
                            },
                            "remove": {
                                "particles_nb": 2
                            }
                        }
                    },
                    "retina_detect": true,
                    "config_demo": {
                        "hide_card": false,
                        "background_color": "#b61924",
                        "background_image": "",
                        "background_position": "50% 50%",
                        "background_repeat": "no-repeat",
                        "background_size": "cover"
                    }
                });
            }
        });
    </script>
</body>

</html>
