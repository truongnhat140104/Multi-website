<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Reeni is a modern personal portfolio template for designers, developers, content writer, cleaner, programmer, fashion designer, model, Influencer and freelancers. Fully responsive, SEO-friendly, Bootstrap and easy to customize.">
    <link rel="shortcut icon" type="image/x-icon" href="../assets/images/favicon.svg">
    <title>Home 13 Reeni - Personal Portfolio HTML Template | Freelancer & Developer Portfolio</title>
    <!-- Bootstrap min css -->
    <link rel="stylesheet" href="../assets/css/vendor/fontawesome.css">
    <link rel="stylesheet" href="../assets/css/plugins/swiper.css">
    <link rel="stylesheet" href="../assets/css/plugins/odometer.css">
    <link rel="stylesheet" href="../assets/css/vendor/animate.min.css">
    <link rel="stylesheet" href="../assets/css/vendor/bootstrap.min.css">

    <link rel="stylesheet" href="../assets/css/style.css">

<body class="personal-demo-left-fixed">

    <!-- Header, sidebar cố định (desktop) và menu popup (mobile) -->
    <div data-component="partials/header.html"></div>
    <div data-component="partials/sidebar.html"></div>
    <div data-component="partials/mobile-menu.html"></div>

    <!-- Khung sườn bố cục 2 cột: ảnh profile (trái) + nội dung chính (phải) -->
    <div class="personal-page-inner-wrapper">
        <div class="container-fluid-13">
            <div class="row">
                <div class="col-xl-4">
                    <div data-component="partials/profile.html"></div>
                </div>
                <div class="col-xl-8 pl--70 pl_md--15 pl_sm--15 pt--70">
                    <div class="personal-portfolio-right-inner-wrapper">
                        <div data-component="partials/intro-counter.html"></div>
                        <div data-component="partials/about.html"></div>
                        <div data-component="partials/resume.html"></div>
                        <div data-component="partials/service.html"></div>
                        <div data-component="partials/skills.html"></div>
                        <div data-component="partials/portfolio.html"></div>
                        <div data-component="partials/pricing.html"></div>
                        <div data-component="partials/contact.html"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div data-component="partials/footer.html"></div>
    <div data-component="partials/chat-widget.html"></div>
    <div data-component="partials/scroll-progress.html"></div>

    <!-- Loader: nạp component rồi mới nạp vendor/plugin scripts theo đúng thứ tự -->
    <script src="assets/include.js"></script>
