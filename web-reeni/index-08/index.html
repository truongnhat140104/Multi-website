<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Reeni is a modern personal portfolio template for designers, developers, content writer, cleaner, programmer, fashion designer, model, Influencer and freelancers. Fully responsive, SEO-friendly, Bootstrap and easy to customize.">
    <link rel="shortcut icon" type="image/x-icon" href="../assets/images/favicon.svg">
    <title>Home 08 Reeni - Personal Portfolio HTML Template | Freelancer & Developer Portfolio</title>
    <!-- Bootstrap min css -->
    <link rel="stylesheet" href="../assets/css/vendor/fontawesome.css">
    <link rel="stylesheet" href="../assets/css/plugins/swiper.css">
    <link rel="stylesheet" href="../assets/css/plugins/odometer.css">
    <link rel="stylesheet" href="../assets/css/vendor/animate.min.css">
    <link rel="stylesheet" href="../assets/css/vendor/bootstrap.min.css">
    <!-- custom css -->
    <link rel="stylesheet" href="../assets/css/style.css">
</head>

<body class="spybody index-8 card-1-body" data-spy="scroll" data-bs-target=".navbar-example2" data-offset="70">
    <div data-component="background"></div>

    <div class="cv-card-area">
        <div class="plr--150 plr_lg--30 plr_md--30 plr_sm--30 plr_mobile--15">
            <div class="row row--25">
                <div class="order-1 col-xxl-3 col-lg-12">
                    <div data-component="profile-card"></div>
                </div>
                <div class="order-3 order-xl-2 col-xxl-7 col-lg-10">
                    <div class="tmp-tab-content-area tab-wrapper-overlay-to-top">
                        <div class="d-flex align-items-start">
                            <div class="tmp-all-tab-content tab-content" id="v-pills-tabContent">
                                <div data-component="about"></div>
                                <div data-component="resume"></div>
                                <div data-component="portfolio"></div>
                                <div data-component="blog"></div>
                                <div data-component="contact"></div>

                            </div>
                        </div>
                    </div>
                </div>

                <div class="order-2 order-xl-3 col-xxl-2 col-lg-2">
                    <div data-component="tab-navigation"></div>
                </div>

            </div>
        </div>
    </div>

    <div data-component="footer"></div>

    <div data-component="chat-widget"></div>
    <div data-component="scroll-top"></div>
    <div data-component="demo-selector"></div>

    <script src="../component-loader.js"></script>

    <script>
        window.componentsReady.then(() => {
            if (typeof particlesJS === 'function') {
                particlesJS('particles-js',

                    {
                        "particles": {
                            "number": {
                                "value": 10,
                                "density": {
                                    "enable": true,
                                    "value_area": 800
                                }
                            },
                            "color": {
                                "value": ["#ffffff", ]
                            },
                            "shape": {
                                "type": "star",
                                "stroke": {
                                    "width": 0,
                                    "color": "#000000"
                                },
                                "polygon": {
                                    "nb_sides": 5
                                },
                                "image": {
                                    "src": "img/github.svg",
                                    "width": 100,
                                    "height": 100
                                }
                            },
                            "opacity": {
                                "value": 0.8,
                                "random": true,
                                "anim": {
                                    "enable": false,
                                    "speed": 1,
                                    "opacity_min": 0.1,
                                    "sync": false
                                }
                            },
                            "size": {
                                "value": 4,
                                "random": true,
                                "anim": {
                                    "enable": false,
                                    "speed": 40,
                                    "size_min": 0.1,
                                    "sync": false
                                }
                            },
                            "line_linked": {
                                "enable": false,
                                "distance": 150,
                                "color": "#ffffff",
                                "opacity": 0.4,
                                "width": 1
                            },
                            "move": {
                                "enable": true,
                                "speed": 6,
                                "direction": "none",
                                "random": false,
                                "straight": false,
                                "out_mode": "out",
                                "attract": {
                                    "enable": false,
                                    "rotateX": 600,
                                    "rotateY": 1200
                                }
                            }
                        },
                        "interactivity": {
                            "detect_on": "canvas",
                            "events": {
                                "onhover": {
                                    "enable": true,
                                    "mode": "repulse"
                                },
                                "onclick": {
                                    "enable": true,
                                    "mode": "push"
                                },
                                "resize": true
                            },
                            "modes": {
                                "grab": {
                                    "distance": 400,
                                    "line_linked": {
                                        "opacity": 1
                                    }
                                },
                                "bubble": {
                                    "distance": 800,
                                    "size": 40,
                                    "duration": 2,
                                    "opacity": 8,
                                    "speed": 3
                                },
                                "repulse": {
                                    "distance": 200
                                },
                                "push": {
                                    "particles_nb": 4
                                },
                                "remove": {
                                    "particles_nb": 2
                                }
                            }
                        },
                        "retina_detect": true,
                        "config_demo": {
                            "hide_card": false,
                            "background_color": "#b61924",
                            "background_image": "",
                            "background_position": "50% 50%",
                            "background_repeat": "no-repeat",
                            "background_size": "cover"
                        }
                    }

                );
            }
        });
    </script>
    <script>
        function downloadFile() {
            const link = document.createElement('a');
            link.href = '../assets/images/cv.pdf';
            link.download = 'cv.pdf';
            link.click();
        }
    </script>

</body>

</html>
